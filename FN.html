<script language="JavaScript">
	function SaveDesc(form)  {document.querySelectorAll("textarea").forEach((el,i) => (localStorage.setItem(i, el.value)));}
	function ClearDesc(form) {
		document.querySelectorAll("textarea").forEach((el) => (el.value = ""));
		document.querySelectorAll('li[id^="output"]').forEach((el) => (el.innerHTML = ""));
	}	
	function InputDesc(form) {
		document.querySelectorAll("textarea").forEach((el,i) => (el.value = localStorage.getItem(i)));
		document.querySelectorAll('li[id^="output"]').forEach((el,i) => (el.innerHTML = localStorage.getItem(i)));
	}
</script>

<script defer>
	/*** INPUTS-LI - START ***/
	// Получаем все textarea и li элементы на странице по их id
	const inputs = document.querySelectorAll('textarea[id^="input"]');
	const outputs = document.querySelectorAll('li[id^="output"]');
	
	// Проходимся по каждому textarea и устанавливаем его значение в соответствующий li элемент
	for (let i = 0; i < inputs.length; i++) {
		const input = inputs[i];
		const output = outputs[i];
		
		output.textContent = input.value;
		
		// Добавляем обработчик события input для каждого textarea
		input.addEventListener("input", () => {
			output.textContent = input.value;
		});
	}
	/*** INPUTS-LI - END ***/


	/*** CopyClearButtons - START ***/
	// Для каждой кнопки копирования добавляем обработчик события нажатия
	document.querySelectorAll('.ta_buttons #btn_copy').forEach(function(button) {
		button.addEventListener('click', function() {
			var textarea = this.parentNode.parentNode.querySelector('textarea');
			textarea.select();
			document.execCommand('copy');
		});
	});

	// Для каждой кнопки очистки добавляем обработчик события нажатия
	document.querySelectorAll('.ta_buttons #btn_clear').forEach(function(button) {
		button.addEventListener('click', function() {
			const textArea = this.parentNode.parentNode.querySelector('textarea');
			const listItem = document.querySelector(`#output${textArea.id.slice(-2)}`);
			
			textArea.value = '';
			listItem.textContent = '';
		});
	});
	
	// Кнопка коппирования на странице быстрой обработки текста
	function txtFastCopy() {
		var textField = document.getElementById("txt_fast");
		textField.select();
		document.execCommand("copy");
	}
	function txtFastClear() {
		var textField = document.getElementById("txt_fast");
		textField.value = "";
	}

	/*** CopyClearButtons - END ***/

	function repTxtBase() {
		let input = document.getElementById("txt_fast");
		let content = input.value.trim();

		let sLine1="··········································································································································";
		let sLine2="▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬";
		let sLine3="■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■";
		// Удаляем повторные строки
		let lines = content.split("\n").filter(line => line !== '');
		// Цикл-проверка
		let i = 0;
		while (i < lines.length) {
			if (lines[i] === sLine1 || lines[i] === sLine2 || lines[i] === sLine3) {
			while (i + 1 < lines.length && (lines[i + 1] === sLine1 || lines[i + 1] === sLine2 || lines[i + 1] === sLine3)) {
				lines.splice(i + 1, 1);
			}
			i++;
			} else {
			i++;
			}
		}
		// Возвращаем результат
		content = lines.join("\n");
	
		// Разделение текста на строки, очистка и форматирование каждой строки
		let formattedContent = content.split('\n')
			.filter(line => line !== '')
			.map(line => line.trim()
				.replace(/\"{2,}/g, '')
				.replace(/\(\)/g, '')
				.replace(/\s+/g, ' ')
				.replace(/\t+/g, ' ')
				.replace(/•\s+|•/g, '')
				.replace(/-+|–+|—+/g, "-")
				.replace(/^./, match => match.toUpperCase())
			)
			.join('\n').replace(/\n- /g, "\n");

		input.value = formattedContent;
	}
	function repTxtAa() {
	var inputText = document.getElementById('txt_fast').value;

	var transformedText = inputText.split('\n')
		.map(line => {
		var [firstPart, ...restParts] = line.split(' ');
		var secondPart = restParts.join(' ').replace(/^./, match => match.toUpperCase());
		return `${firstPart} ${secondPart}`;
		})
		.join('\n');

function replaceTxt() {
	var clickedButton = event.target; // Получаем нажатую кнопку

	// Находим textarea
	var textarea = document.getElementById("txt_fast");

	// Получаем значение из полей ввода
	var targetText = targetInput.value;
	var replacementText = replacementInput.value;

	// Экранируем специальные символы в целевом тексте
	var escapedTargetText = targetText.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

	// Создаем регулярное выражение для замены всех совпадений
	var regex = new RegExp(escapedTargetText, "g");

	// Заменяем текст в textarea
	textarea.value = textarea.value.replace(regex, replacementText);
}

                // Заменяем абзац в тексте

document.addEventListener('DOMContentLoaded', function () {
    var checkbox = document.querySelector('input[type="checkbox"]');
    var textarea = document.getElementById('txt_fast');

    textarea.addEventListener('click', function (event) {
        if (checkbox.checked) {
            var start = textarea.selectionStart;
            var end = textarea.selectionEnd;

            // Получаем информацию о символе под кликом
            var charIndex = textarea.selectionStart;
            var lineStart = textarea.value.lastIndexOf('\n', charIndex - 1) + 1;
            var lineEnd = textarea.value.indexOf('\n', charIndex);
            if (lineEnd === -1) {
                lineEnd = textarea.value.length;
            }

            var lineText = textarea.value.substring(lineStart, lineEnd);

            // Определяем, был ли клик в самое начало строки перед первым символом
            if (charIndex === lineStart) {
                // Клик был в самом начале строки перед первым символом, ничего не выделяем
                textarea.setSelectionRange(lineStart, lineStart);
                return;
            }

            // Определяем, был ли клик перед последним символом строки, самый конец строки
            if (charIndex === lineEnd) {
                // Клик был после последнего символа строки, ничего не выделяем
                textarea.setSelectionRange(lineEnd, lineEnd);
                return;
            }

            // Определяем, был ли клик по первому слову строки
            var firstWordMatch = lineText.match(/^\S+/);
            if (!firstWordMatch) {
                // Не было выбрано первое слово строки, выделяем всю строку
                textarea.setSelectionRange(lineStart, lineEnd);
                return;
            }

            var firstWord = firstWordMatch[0];
            var firstWordEnd = lineStart + lineText.indexOf(firstWord) + firstWord.length;

            if (charIndex < firstWordEnd) {
                // Клик был по первому слову строки, выделяем его
                textarea.setSelectionRange(lineStart, firstWordEnd);
            } else {
                // Клик был в любом другом месте строки, выделяем всю строку
                textarea.setSelectionRange(lineStart, lineEnd);
            }
        }
    });

    checkbox.addEventListener('change', function () {
        // Если checkbox не отмечен, убираем обработчик клика

        }

});
