<script>
	/*** INPUTS-LI - START ***/
	// Получаем все textarea и li элементы на странице по их id
	const inputs = document.querySelectorAll('textarea[id^="input"]');
	const outputs = document.querySelectorAll('li[id^="output"]');
	
	// Проходимся по каждому textarea и устанавливаем его значение в соответствующий li элемент
	for (let i = 0; i < inputs.length; i++) {
		const input = inputs[i];
		const output = outputs[i];
		
		output.textContent = input.value;
		
		// Добавляем обработчик события input для каждого textarea
		input.addEventListener("input", () => {
			output.textContent = input.value;
		});
	}
	/*** INPUTS-LI - END ***/


	/*** CopyClearButtons - START ***/
	// Для каждой кнопки копирования добавляем обработчик события нажатия
	document.querySelectorAll('.ta_buttons #btn_copy').forEach(function(button) {
		button.addEventListener('click', function() {
			var textarea = this.parentNode.parentNode.querySelector('textarea');
			textarea.select();
			document.execCommand('copy');
		});
	});

	// Для каждой кнопки очистки добавляем обработчик события нажатия
	document.querySelectorAll('.ta_buttons #btn_clear').forEach(function(button) {
		button.addEventListener('click', function() {
			const textArea = this.parentNode.parentNode.querySelector('textarea');
			const listItem = document.querySelector(`#output${textArea.id.slice(-2)}`);
			
			textArea.value = '';
			listItem.textContent = '';
		});
	});
	/*** CopyClearButtons - END ***/

	function replaceTabs() {
		let input = document.getElementById("txt_fast");
		let content = input.value.trim();
		content = content.replace(/(Рабочие параметры|Конструктивные и функциональные особенности|Дополнительная информация|Характеристики двигателя и устройства|Дополнительная информация|ABAC |КОПИЯ )/g, '');
		content = content.replace(/\t/g, "");
		content = content.replace(/\n- /g, "\n");
		content = content.replace(/\s{2,}/g, "\n");
		content = content.replace(/(• |•)/g, "");
		input.value = content;
	}
	function replaceTabsA() {
		let input = document.getElementById("txt_fast");
		let content = input.value.trim();
		content = content.replace(/\t/g, "");
		content = content.replace(/\n- /g, "\n");
		content = content.replace(/\s{2,}/g, "\n");
		content = content.replace(/\n/g, "\n\n");
		content = content.replace(/(• |•)/g, "");
		input.value = content;
	}
	function replaceTabsList() {
		let input = document.getElementById("txt_fast");
		let content = input.value.trim();
		content = content.replace(/(Рабочие параметры|Конструктивные и функциональные особенности|Дополнительная информация|Характеристики двигателя и устройства|Дополнительная информация|ABAC |КОПИЯ )/g, '');
		content = content.replace(/•/g, "\n");
		content = content.replace(/\t/g, "");		
		content = content.replace(/\n- /g, "\n");
		content = content.replace(/\s{2,}/g, "\n");		
		input.value = content.trim();
		content = content.replace(/\n/g, "\n• ");
		input.value = content.startsWith("\n•") ? content.trim() : "• " + content;
	}
	function replaceComplectation() {
		let input = document.getElementById("txt_fast");
		let content = input.value.trim();
		content = content.replace(/;{2,}/g, ";");
		content = content.replace(/\t/g, "");
		content = content.replace(/\n- /g, "\n");
		content = content.replace(/\s{2,}/g, "\n");
		content = content.replace(/[\n]+/g, "; ");	
		content = content.replace(/;{2,}/g, ";");	
		input.value = content;
	}
	function replaceComplectation2() {
		let input = document.getElementById("txt_fast");
		let content = input.value.trim();
		content = content.replace(/(, | и)/g, '; ');	
		input.value = content;
	}
	function replaceComplectation3() {
		let input = document.getElementById("txt_fast");
		let content = input.value.trim();
		content = content.replace(/(,|, )/g, '; ');	
		input.value = content;
	}
	function replaceDivide() {
		let input = document.getElementById("txt_fast");
		let content = input.value.trim();
		content = content.replace(/;/g, "\n");
		content = content.replace(/\t/g, "");
		content = content.replace(/\s{2,}/g, "\n");
		input.value = content;
	}
	function replaceDivide2() {
		let input = document.getElementById("txt_fast");
		let content = input.value.trim();
		content = content.replace(/,/g, "\n");
		content = content.replace(/\t/g, "");
		content = content.replace(/\s{2,}/g, "\n");
		input.value = content;
	}
	function replaceParams() {
		let input = document.getElementById("txt_fast");
		let content = input.value.trim();
		content = content.replace(/(Рабочие параметры|Конструктивные и функциональные особенности|Дополнительная информация|Дополнительная информация|Характеристики двигателя и устройства)/g, '\n');
		content = content.replace(/\t/g, "");
		content = content.replace(/\s{2,}/g, "\n");
		content = content.trim();

		let lines = content.split("\n");
		for (let i = 0; i < lines.length; i++) {
			if (i % 2 == 0) {
				lines[i] += ":";
			}
		}
		content = lines.join("\n");
		content = content.replace(/:\n/g, ': ');
		content = content.replace(/:{2,}/g, ":");
		input.value = content;
	}
	function replaceTrim() {
		let input = document.getElementById("txt_fast");
		let content = input.value.trim();
		input.value = content;
	}
	function genLines() {
  // Получаем элементы DOM
		const input = document.getElementById('gen_input');
		const textarea = document.getElementById('txt_fast');

		// Получаем максимальное число из input
		const maxNumber = parseInt(input.value);

		// Создаем массив для хранения прогрессии
		const progression = [];

		// Заполняем массив числами от 1 до maxNumber
		for (let i = 1; i <= maxNumber; i++) {
			progression.push(i);
		}

		// Преобразуем массив в строку, разделяя элементы переводом строки
		const result = progression.join('\n');

		// Выводим результат в textarea
		textarea.value = result;
		}
