<script language="JavaScript">
	function SaveDesc(form)  {document.querySelectorAll("textarea").forEach((el,i) => (localStorage.setItem(i, el.value)));}
	function ClearDesc(form) {
		document.querySelectorAll("textarea").forEach((el) => (el.value = ""));
		document.querySelectorAll('li[id^="output"]').forEach((el) => (el.innerHTML = ""));
	}	
	function InputDesc(form) {
		document.querySelectorAll("textarea").forEach((el,i) => (el.value = localStorage.getItem(i)));
		document.querySelectorAll('li[id^="output"]').forEach((el,i) => (el.innerHTML = localStorage.getItem(i)));
	}

  // Получаем элементы DOM

		// Получаем максимальное число из input

		const progression = [];

		const result = progression.join('\n');

		// Выводим результат в textarea
		textarea.value = result;

var textarea = document.getElementById('txt_fast');
var numsContainer = document.getElementById('nums');

// Обработчик события ввода в textarea
textarea.addEventListener('input', updateLineNumbers);

// Инициализация номеров строк при загрузке страницы
updateLineNumbers();

// Функция обновления номеров строк
function updateLineNumbers() {
  // Получаем содержимое textarea и разбиваем его на строки
  var text = textarea.value;
  var lines = text.split('\n');

  // Очищаем элемент с id='nums'
  numsContainer.innerHTML = '';

  // Добавляем номера строк в элемент с id='nums'
  for (var i = 1; i <= lines.length; i++) {
    var lineNum = document.createElement('div');
    lineNum.textContent = i;
    numsContainer.appendChild(lineNum);
  }
}

function copyMidLine() {
  const dashCount = 169; // Количество дефисов для копирования
  const textToCopy = '-'.repeat(dashCount); // Генерируем строку с нужным количеством дефисов
  navigator.clipboard.writeText(textToCopy)
    .then(() => {
      console.log('Текст скопирован в буфер обмена: ' + textToCopy);
      // Здесь можно добавить дополнительные действия после копирования
    })
    .catch((error) => {
      console.error('Не удалось скопировать текст: ', error);
      // Здесь можно добавить обработку ошибки, если не удалось скопировать текст
    });
}

function replaceTxt() {
  var inputText = document.getElementById('replace_input').value;  // Получаем значение из поля input
  var textarea = document.getElementById('txt_fast');  // Получаем элемент textarea
  var text = textarea.value;  // Получаем текст из textarea
  var escapedInputText = inputText.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');  // Экранируем специальные символы для поиска

  var regex = new RegExp(escapedInputText, 'g');  // Создаем регулярное выражение для поиска совпадений

  // Заменяем все совпадения на пустую строку
  var replacedText = text.replace(regex, '');

  // Обновляем значение в textarea
  textarea.value = replacedText;
}
